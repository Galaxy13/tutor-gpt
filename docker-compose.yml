services:
  postgres:
    image: postgres:16-alpine
    container_name: tutor-postgres
    environment:
      POSTGRES_DB: tutor
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tutor-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: image-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ADMIN}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - tutor-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    restart: no
    environment:
      MINIO_ROOT_USER: ${MINIO_ADMIN}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_SERVER_URL: "http://localhost:9000"
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb myminio/chat-images --ignore-existing;
      mc anonymous set download myminio/chat-images;
      exit 0;
      "
    networks:
      - tutor-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - 8080
    environment:
      - DATASOURCE_URL=jdbc:postgresql://postgres:5432/tutor
      - MINIO_INTERNAL_URL=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ADMIN=${MINIO_ADMIN}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAPI_KEY=${OPENAPI_KEY}
    networks:
      - tutor-network

  frontend:
    build:
      context: src/ui/tutor-ui
      dockerfile: Dockerfile
    container_name: tutor-ui
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - tutor-network

volumes:
  postgres_data:
  minio_data:

networks:
  tutor-network:
    driver: bridge